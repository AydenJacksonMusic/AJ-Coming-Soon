<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourthwall Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ================= CONFIG =================
        const STOREFRONT_TOKEN = "ptkn_1f073ce7-bd7d-4322-82ff-95552325b510"; // ← MUST replace
        const SHOP_DOMAIN = "ayden-jackson-shop.fourthwall.com";       // ← Your actual shop domain
        const API_BASE = "https://storefront-api.fourthwall.com/v1";

        const CartContext = createContext();

        function CartProvider({ children }) {
            const [cartId, setCartId] = useState(localStorage.getItem('fourthwall_cartId'));
            const [cart, setCart] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [error, setError] = useState(null);

            const log = (msg, data) => console.log(`[Cart] ${msg}`, data);

            const ensureCart = async () => {
                if (cartId) {
                    try {
                        const res = await fetch(`${API_BASE}/carts/${cartId}?storefront_token=${STOREFRONT_TOKEN}`);
                        if (res.ok) return cartId;
                    } catch (e) { log("Cart check failed", e); }
                }

                const res = await fetch(`${API_BASE}/carts?storefront_token=${STOREFRONT_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currency: 'USD' })
                });

                if (!res.ok) throw new Error(`Create cart failed: ${res.status}`);
                const newCart = await res.json();
                localStorage.setItem('fourthwall_cartId', newCart.id);
                setCartId(newCart.id);
                return newCart.id;
            };

            const refreshCart = async () => {
                if (!cartId) return;
                try {
                    const res = await fetch(`${API_BASE}/carts/${cartId}?storefront_token=${STOREFRONT_TOKEN}`);
                    if (res.ok) {
                        const data = await res.json();
                        setCart(data);
                        setError(null);
                    }
                } catch (e) {
                    console.error(e);
                }
            };

            const addToCart = async (variantId, quantity = 1) => {
                if (!variantId) {
                    alert("No variant ID found for this product");
                    return;
                }
                try {
                    setError(null);
                    const id = await ensureCart();

                    // Try both known endpoints
                    let res = await fetch(`${API_BASE}/carts/${id}/items?storefront_token=${STOREFRONT_TOKEN}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ variantId, quantity })
                    });

                    if (!res.ok) {
                        // Fallback to /add endpoint
                        res = await fetch(`${API_BASE}/carts/${id}/add?storefront_token=${STOREFRONT_TOKEN}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ items: [{ variantId, quantity }] })
                        });
                    }

                    if (!res.ok) {
                        const text = await res.text();
                        throw new Error(`Add failed (${res.status}): ${text}`);
                    }

                    await refreshCart();
                    setIsCartOpen(true);
                    log("Added to cart", { variantId });
                } catch (err) {
                    console.error(err);
                    setError(err.message);
                    alert("Failed to add to cart: " + err.message);
                }
            };

            const removeFromCart = async (variantId) => {
                if (!cartId) return;
                try {
                    await fetch(`${API_BASE}/carts/${cartId}/items/${variantId}?storefront_token=${STOREFRONT_TOKEN}`, {
                        method: 'DELETE'
                    });
                    await refreshCart();
                } catch (e) { console.error(e); }
            };

            const checkout = () => {
                if (!cartId) return alert("Cart is empty");
                const params = new URLSearchParams({ cartCurrency: 'USD', cartId });
                window.location.href = `https://${SHOP_DOMAIN}/checkout/?${params.toString()}`;
            };

            useEffect(() => {
                if (cartId) refreshCart();
            }, [cartId]);

            return React.createElement(CartContext.Provider, {
                value: { cart, addToCart, removeFromCart, checkout, isCartOpen, setIsCartOpen, error }
            }, children);
        }

        // ... (App, ProductCard, CartDrawer components remain mostly the same)

        function App() {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const { cart, addToCart, isCartOpen, setIsCartOpen, error } = useContext(CartContext);

            useEffect(() => {
                fetch(`${API_BASE}/collections/all/products?storefront_token=${STOREFRONT_TOKEN}&size=50`)
                    .then(r => r.json())
                    .then(data => {
                        setProducts(data.results || []);
                        setLoading(false);
                    })
                    .catch(err => {
                        console.error(err);
                        setLoading(false);
                    });
            }, []);

            const filteredProducts = products.filter(p =>
                p.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return React.createElement('div', { className: 'min-h-screen bg-zinc-950' },
                // Header (same as before)
                React.createElement('header', { className: 'sticky top-0 bg-zinc-900 border-b border-zinc-800 z-50' },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-5 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('h1', { className: 'text-3xl font-bold tracking-tighter' }, 'SHOP')
                        ),
                        React.createElement('div', { className: 'flex items-center gap-8' },
                            React.createElement('input', {
                                type: 'text', placeholder: 'Search...', value: searchTerm,
                                onChange: e => setSearchTerm(e.target.value),
                                className: 'bg-zinc-800 border border-zinc-700 rounded-full px-5 py-2.5 w-80 focus:outline-none focus:border-emerald-500'
                            }),
                            React.createElement('button', {
                                onClick: () => setIsCartOpen(true),
                                className: 'relative flex items-center gap-2 text-xl'
                            }, React.createElement('i', { className: 'fa-solid fa-cart-shopping' }),
                                cart?.items?.length > 0 && React.createElement('span', {
                                    className: 'absolute -top-1 -right-1 bg-emerald-500 text-xs w-5 h-5 flex items-center justify-center rounded-full'
                                }, cart.items.length)
                            )
                        )
                    )
                ),

                // Products Grid
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-12' },
                    loading ? React.createElement('div', { className: 'text-center py-20' }, 'Loading products...') :
                    React.createElement('div', { className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8' },
                        filteredProducts.map(p => React.createElement(ProductCard, { key: p.id, product: p, addToCart }))
                    )
                ),

                React.createElement(CartDrawer, { isOpen: isCartOpen, setIsOpen: setIsCartOpen })
            );
        }

        function ProductCard({ product, addToCart }) {
            const variant = product.variants?.[0];
            return React.createElement('div', { className: 'product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800' },
                React.createElement('div', { className: 'relative aspect-square' },
                    React.createElement('img', {
                        src: product.images?.[0]?.url || 'https://picsum.photos/600',
                        className: 'w-full h-full object-cover'
                    })
                ),
                React.createElement('div', { className: 'p-6' },
                    React.createElement('h4', { className: 'font-semibold mb-2' }, product.name),
                    React.createElement('button', {
                        onClick: () => addToCart(variant?.id),
                        className: 'w-full bg-white text-black font-semibold py-4 rounded-2xl hover:bg-emerald-400'
                    }, 'Add to Cart')
                )
            );
        }

        function CartDrawer({ isOpen, setIsOpen }) {
            const { cart, removeFromCart, checkout } = useContext(CartContext);
            if (!isOpen) return null;

            return React.createElement('div', { className: 'fixed inset-0 z-50 flex' },
                // backdrop + drawer (same as previous version)
                // ... (omitted for brevity – same as before)
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            React.createElement(CartProvider, null,
                React.createElement(App)
            )
        );
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourthwall Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
        .cart-drawer { transform: translateX(100%); transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }
        .cart-drawer.open { transform: translateX(0); }
        .toast { animation: toastIn 0.3s ease forwards; }
        @keyframes toastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- [Navigation + Hero + Products same as before] -->
    <nav class="bg-black border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <h1 id="shop-name" class="title-font text-3xl font-semibold tracking-tight">Store</h1>
            </div>
            <div class="flex items-center gap-6">
                <div class="relative">
                    <input id="search-input" type="text" placeholder="Search products..." 
                           class="bg-zinc-900 border border-zinc-700 rounded-full pl-10 py-2.5 w-80 focus:outline-none focus:border-zinc-500 text-sm">
                    <i class="fas fa-search absolute left-4 top-3 text-zinc-500"></i>
                </div>
                <button onclick="toggleCart()" class="flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 px-5 py-2.5 rounded-2xl border border-zinc-700 transition-colors relative">
                    <i class="fas fa-shopping-bag"></i> <span>Cart</span>
                    <span id="cart-count" class="absolute -top-1.5 -right-1.5 bg-red-500 text-white text-[10px] font-mono w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </button>
                <button onclick="showSettings()" class="p-3 hover:bg-zinc-900 rounded-2xl transition-colors">
                    <i class="fas fa-cog"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div class="mb-16 text-center">
            <h2 id="hero-title" class="title-font text-6xl font-semibold tracking-tighter mb-4">Our Collection</h2>
            <p id="hero-subtitle" class="text-zinc-400">High-quality merch powered by Fourthwall</p>
        </div>
        <div id="products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8"></div>
    </main>

    <!-- Cart Drawer (same as previous) -->
    <div id="cart-drawer" class="cart-drawer fixed top-0 bottom-0 right-0 w-full max-w-md bg-zinc-900 border-l border-zinc-700 shadow-2xl z-[100] overflow-hidden flex flex-col">
        <div class="p-6 border-b border-zinc-700 flex items-center justify-between">
            <h2 class="text-2xl font-semibold">Your Cart</h2>
            <button onclick="toggleCart()" class="text-2xl text-zinc-400 hover:text-white">✕</button>
        </div>
        <div id="cart-items" class="flex-1 overflow-auto p-6 space-y-6"></div>
        <div class="p-6 border-t border-zinc-700">
            <div class="flex justify-between text-lg mb-6">
                <span class="font-medium">Total</span>
                <span id="cart-total" class="font-semibold">$0.00</span>
            </div>
            <button onclick="checkout()" class="w-full bg-white text-black py-4 rounded-2xl font-semibold hover:bg-zinc-200 transition-colors flex items-center justify-center gap-2">
                <i class="fas fa-lock"></i> CHECKOUT WITH FOURTHWALL
            </button>
        </div>
    </div>

    <!-- Settings Modal (same) -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[200]">
        <div class="bg-zinc-900 rounded-3xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-semibold mb-6">Store Settings</h3>
            <div class="space-y-6">
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Storefront Token</label>
                    <input id="token-input" type="password" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-2">Checkout Domain (yourshop.fourthwall.com)</label>
                    <input id="domain-input" type="text" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="saveSettings()" class="flex-1 bg-white text-black py-4 rounded-2xl font-semibold">Save & Reload</button>
                <button onclick="hideSettings()" class="flex-1 border border-zinc-700 py-4 rounded-2xl">Cancel</button>
            </div>
        </div>
    </div>

    <div id="toast-container" class="fixed bottom-6 right-6 z-[300] space-y-3"></div>

    <script>
        let STOREFRONT_TOKEN = localStorage.getItem('fw_token') || '';
        let CHECKOUT_DOMAIN = localStorage.getItem('fw_checkout_domain') || '';
        const API_BASE = 'https://storefront-api.fourthwall.com/v1';
        let currentCartId = localStorage.getItem('fw_cart_id') || null;
        let products = [];

        function formatPrice(price) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(price || 0);
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast flex items-center gap-3 px-6 py-4 rounded-2xl shadow-xl text-sm ${type === 'error' ? 'bg-red-900 text-red-100' : 'bg-zinc-800 text-white'}`;
            toast.innerHTML = `${type === 'success' ? '<i class="fas fa-check-circle text-green-400"></i>' : '<i class="fas fa-exclamation-triangle text-red-400"></i>'} <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function apiCall(endpoint, options = {}) {
            const url = new URL(`${API_BASE}${endpoint}`);
            if (STOREFRONT_TOKEN) url.searchParams.set('storefront_token', STOREFRONT_TOKEN);
            const res = await fetch(url, { headers: { 'Content-Type': 'application/json' }, ...options });
            if (!res.ok) {
                const err = await res.text();
                throw new Error(`HTTP ${res.status}: ${err}`);
            }
            return res.json();
        }

        // FIXED: Create cart with proper body
        async function ensureCart() {
            if (currentCartId) {
                try {
                    await apiCall(`/carts/${currentCartId}`);
                    return currentCartId;
                } catch (e) {
                    currentCartId = null;
                    localStorage.removeItem('fw_cart_id');
                }
            }

            // Create empty cart - now with required items array
            const newCart = await apiCall('/carts', {
                method: 'POST',
                body: JSON.stringify({ 
                    items: [], 
                    currency: 'USD' 
                })
            });
            currentCartId = newCart.id;
            localStorage.setItem('fw_cart_id', currentCartId);
            return currentCartId;
        }

        async function addToCart(variantId, quantity = 1) {
            if (!variantId) return showToast('Select a variant', 'error');
            try {
                const cartId = await ensureCart();
                const updated = await apiCall(`/carts/${cartId}/items`, {
                    method: 'POST',
                    body: JSON.stringify({ variantId, quantity })
                });
                showToast('Added to cart!');
                renderCart(updated);
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        async function removeFromCart(index) {
            if (!currentCartId) return;
            try {
                const updated = await apiCall(`/carts/${currentCartId}/items/${index}`, { method: 'DELETE' });
                renderCart(updated);
            } catch (e) {}
        }

        async function updateQuantity(index, qty) {
            if (!currentCartId || qty < 1) return;
            try {
                const updated = await apiCall(`/carts/${currentCartId}/items/${index}`, {
                    method: 'PATCH',
                    body: JSON.stringify({ quantity: qty })
                });
                renderCart(updated);
            } catch (e) {}
        }

        function renderCart(cart) {
            const container = document.getElementById('cart-items');
            container.innerHTML = '';
            if (!cart?.items?.length) {
                container.innerHTML = `<p class="text-center text-zinc-400 py-12">Cart is empty</p>`;
                document.getElementById('cart-total').textContent = '$0.00';
                return;
            }
            // ... (same rendering logic as previous version) ...
            let total = 0;
            cart.items.forEach((item, i) => {
                const price = item.variant?.unitPrice?.value || 0;
                total += price * item.quantity;
                const div = document.createElement('div');
                div.className = "flex gap-4";
                div.innerHTML = `
                    <img src="${item.variant?.images?.[0]?.url || ''}" class="w-20 h-20 object-cover rounded-xl">
                    <div class="flex-1">
                        <div>${item.variant?.product?.name}</div>
                        <div class="text-sm text-zinc-400">${item.variant?.attributes?.description || ''}</div>
                        <div class="flex items-center gap-4 mt-2">
                            <div class="flex border border-zinc-700 rounded-full">
                                <button onclick="updateQuantity(${i}, ${item.quantity-1})" class="px-3">-</button>
                                <span class="px-4">${item.quantity}</span>
                                <button onclick="updateQuantity(${i}, ${item.quantity+1})" class="px-3">+</button>
                            </div>
                            <span class="font-medium">${formatPrice(price * item.quantity)}</span>
                        </div>
                    </div>
                    <button onclick="removeFromCart(${i})" class="text-red-400"><i class="fas fa-trash"></i></button>
                `;
                container.appendChild(div);
            });
            document.getElementById('cart-total').textContent = formatPrice(total);
        }

        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('open');
            if (drawer.classList.contains('open') && currentCartId) {
                apiCall(`/carts/${currentCartId}`).then(renderCart);
            }
        }

        function checkout() {
            if (!currentCartId || !CHECKOUT_DOMAIN) return showToast('Missing cart or domain', 'error');
            const url = `https://${CHECKOUT_DOMAIN}/checkout/?cartCurrency=USD&cartId=${currentCartId}`;
            window.location.href = url;
        }

        // Products, settings, search, bootstrap... (unchanged from previous working version)
        async function fetchProducts() {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = Array(8).fill('<div class="skeleton rounded-3xl h-96"></div>').join('');
            try {
                const data = await apiCall('/collections/all/products?size=50');
                products = data.results || [];
                renderProducts(products);
            } catch (e) {
                grid.innerHTML = `<div class="col-span-full py-20 text-center text-red-400">Failed to load products.<br>Check token.</div>`;
            }
        }

        function renderProducts(prods) {
            const grid = document.getElementById('products-grid');
            grid.innerHTML = '';
            prods.forEach(product => {
                const card = document.createElement('div');
                card.className = "product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800";
                const img = product.images?.[0]?.url || 'https://placehold.co/600';
                let variantsHTML = '';
                if (product.variants?.length > 1) {
                    variantsHTML = `<select class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-sm" onchange="this.dataset.variant=this.value">` +
                        product.variants.map(v => `<option value="${v.id}">${v.attributes?.description || v.name} — ${formatPrice(v.unitPrice?.value)}</option>`).join('') + `</select>`;
                } else if (product.variants?.[0]) {
                    variantsHTML = `<input type="hidden" data-variant="${product.variants[0].id}">`;
                }
                card.innerHTML = `
                    <img src="${img}" class="w-full aspect-square object-cover">
                    <div class="p-6">
                        <div class="font-semibold">${product.name}</div>
                        ${variantsHTML}
                        <button onclick="handleAddToCart(this)" data-product="${product.id}" class="mt-6 w-full bg-white text-black font-semibold py-4 rounded-2xl">ADD TO CART</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        window.handleAddToCart = function(btn) {
            const card = btn.closest('.product-card');
            let variantId = card.querySelector('select')?.dataset.variant || card.querySelector('input')?.dataset.variant;
            if (variantId) addToCart(variantId);
            else showToast('Select variant first', 'error');
        };

        function showSettings() { /* same as before */ }
        function hideSettings() { /* same */ }
        function saveSettings() {
            STOREFRONT_TOKEN = document.getElementById('token-input').value.trim();
            CHECKOUT_DOMAIN = document.getElementById('domain-input').value.trim();
            localStorage.setItem('fw_token', STOREFRONT_TOKEN);
            localStorage.setItem('fw_checkout_domain', CHECKOUT_DOMAIN);
            location.reload();
        }

        async function bootstrap() {
            if (!STOREFRONT_TOKEN) return showSettings();
            await fetchProducts();
            // Load cart if exists
            if (currentCartId) {
                try {
                    const cart = await apiCall(`/carts/${currentCartId}`);
                    document.getElementById('cart-count').textContent = cart.items?.length || 0;
                } catch (e) {}
            }
        }

        window.onload = bootstrap;
    </script>
</body>
</html>

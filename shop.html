<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fourthwall Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .product-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/babel-standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, createContext, useContext } = React;

        // ================= CONFIG =================
        const STOREFRONT_TOKEN = "ptkn_1f073ce7-bd7d-4322-82ff-95552325b510"; // ← Replace with your token from Fourthwall Settings > For Developers
        const SHOP_DOMAIN = "ayden-jackson-shop.fourthwall.com"; // ← Your shop domain (e.g. aydenjacmusic.fourthwall.com)
        const API_BASE = "https://storefront-api.fourthwall.com/v1";

        const CartContext = createContext();

        function CartProvider({ children }) {
            const [cartId, setCartId] = useState(localStorage.getItem('fourthwall_cartId'));
            const [cart, setCart] = useState(null);
            const [isCartOpen, setIsCartOpen] = useState(false);

            const ensureCart = async () => {
                if (cartId) {
                    try {
                        const res = await fetch(`${API_BASE}/carts/${cartId}?storefront_token=${STOREFRONT_TOKEN}`);
                        if (res.ok) return cartId;
                    } catch (e) {}
                }

                const res = await fetch(`${API_BASE}/carts?storefront_token=${STOREFRONT_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ currency: 'USD' })
                });
                const newCart = await res.json();
                localStorage.setItem('fourthwall_cartId', newCart.id);
                setCartId(newCart.id);
                return newCart.id;
            };

            const refreshCart = async () => {
                if (!cartId) return;
                const res = await fetch(`${API_BASE}/carts/${cartId}?storefront_token=${STOREFRONT_TOKEN}`);
                if (res.ok) {
                    const data = await res.json();
                    setCart(data);
                }
            };

            const addToCart = async (variantId, quantity = 1) => {
                const id = await ensureCart();
                await fetch(`${API_BASE}/carts/${id}/items?storefront_token=${STOREFRONT_TOKEN}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ variantId, quantity })
                });
                await refreshCart();
                setIsCartOpen(true);
            };

            const removeFromCart = async (variantId) => {
                if (!cartId) return;
                await fetch(`${API_BASE}/carts/${cartId}/items/${variantId}?storefront_token=${STOREFRONT_TOKEN}`, {
                    method: 'DELETE'
                });
                await refreshCart();
            };

            const checkout = () => {
                if (!cartId) return;
                const params = new URLSearchParams({
                    cartCurrency: 'USD',
                    cartId: cartId
                });
                window.location.href = `https://${SHOP_DOMAIN}/checkout/?${params.toString()}`;
            };

            useEffect(() => {
                if (cartId) refreshCart();
            }, [cartId]);

            return React.createElement(CartContext.Provider, {
                value: { cart, addToCart, removeFromCart, checkout, isCartOpen, setIsCartOpen, refreshCart }
            }, children);
        }

        function App() {
            const [products, setProducts] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const { cart, addToCart, isCartOpen, setIsCartOpen, checkout } = useContext(CartContext);

            useEffect(() => {
                fetchProducts();
            }, []);

            const fetchProducts = async () => {
                try {
                    const res = await fetch(`${API_BASE}/collections/all/products?storefront_token=${STOREFRONT_TOKEN}&size=50`);
                    const data = await res.json();
                    setProducts(data.results || []);
                } catch (error) {
                    console.error("Failed to fetch products", error);
                } finally {
                    setLoading(false);
                }
            };

            const filteredProducts = products.filter(p =>
                p.name.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return React.createElement('div', { className: 'min-h-screen bg-zinc-950' },
                // Header
                React.createElement('header', {
                    className: 'sticky top-0 bg-zinc-900 border-b border-zinc-800 z-50'
                },
                    React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-5 flex items-center justify-between' },
                        React.createElement('div', { className: 'flex items-center gap-3' },
                            React.createElement('h1', { className: 'text-3xl font-bold tracking-tighter' }, 'SHOP'),
                            React.createElement('span', { className: 'text-emerald-400 text-sm font-mono' }, 'POWERED BY FOURTHWALL')
                        ),
                        React.createElement('div', { className: 'flex items-center gap-8' },
                            React.createElement('input', {
                                type: 'text',
                                placeholder: 'Search products...',
                                value: searchTerm,
                                onChange: (e) => setSearchTerm(e.target.value),
                                className: 'bg-zinc-800 border border-zinc-700 rounded-full px-5 py-2.5 w-80 focus:outline-none focus:border-emerald-500 text-sm'
                            }),
                            React.createElement('button', {
                                onClick: () => setIsCartOpen(true),
                                className: 'relative flex items-center gap-2 hover:text-emerald-400 transition-colors'
                            },
                                React.createElement('i', { className: 'fa-solid fa-cart-shopping text-xl' }),
                                cart && cart.items && cart.items.length > 0 && 
                                React.createElement('span', {
                                    className: 'absolute -top-1 -right-1 bg-emerald-500 text-[10px] font-mono w-5 h-5 flex items-center justify-center rounded-full'
                                }, cart.items.length)
                            )
                        )
                    )
                ),

                // Hero
                React.createElement('div', {
                    className: 'bg-gradient-to-br from-zinc-900 to-black py-20 border-b border-zinc-800'
                },
                    React.createElement('div', { className: 'max-w-4xl mx-auto text-center px-6' },
                        React.createElement('h2', { className: 'text-6xl font-bold tracking-tighter mb-4' }, 'Official Merch'),
                        React.createElement('p', { className: 'text-xl text-zinc-400' }, 'High-quality gear. Ships fast.')
                    )
                ),

                // Products Grid
                React.createElement('div', { className: 'max-w-7xl mx-auto px-6 py-12' },
                    React.createElement('div', { className: 'flex justify-between items-center mb-8' },
                        React.createElement('h3', { className: 'text-3xl font-semibold' }, 'All Products'),
                        React.createElement('p', { className: 'text-zinc-500' }, `${filteredProducts.length} items`)
                    ),

                    loading ? 
                    React.createElement('div', { className: 'flex justify-center py-20' },
                        React.createElement('div', { className: 'animate-spin h-8 w-8 border-4 border-zinc-700 border-t-emerald-500 rounded-full' })
                    ) :
                    React.createElement('div', {
                        className: 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8'
                    },
                        filteredProducts.map(product => 
                            React.createElement(ProductCard, {
                                key: product.id,
                                product: product,
                                addToCart: addToCart
                            })
                        )
                    )
                ),

                // Cart Drawer
                React.createElement(CartDrawer, { isOpen: isCartOpen, setIsOpen: setIsCartOpen, checkout: checkout })
            );
        }

        function ProductCard({ product, addToCart }) {
            const defaultVariant = product.variants && product.variants[0];
            const price = defaultVariant ? defaultVariant.unitPrice.value : product.price;

            return React.createElement('div', {
                className: 'product-card bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 group'
            },
                React.createElement('div', { className: 'relative aspect-square' },
                    React.createElement('img', {
                        src: product.images && product.images[0] ? product.images[0].url : 'https://picsum.photos/600/600?random=1',
                        alt: product.name,
                        className: 'w-full h-full object-cover transition-transform group-hover:scale-105'
                    }),
                    React.createElement('div', {
                        className: 'absolute top-4 right-4 bg-black/70 text-xs px-3 py-1 rounded-full font-mono'
                    }, `$${price}`)
                ),
                React.createElement('div', { className: 'p-6' },
                    React.createElement('h4', { className: 'font-semibold text-lg mb-1 line-clamp-2' }, product.name),
                    React.createElement('p', { className: 'text-zinc-500 text-sm mb-6 line-clamp-2' }, product.description || 'Premium merch'),
                    React.createElement('button', {
                        onClick: () => {
                            if (defaultVariant) {
                                addToCart(defaultVariant.id);
                            } else {
                                alert('No variants available');
                            }
                        },
                        className: 'w-full bg-white hover:bg-emerald-400 hover:text-black text-black font-semibold py-4 rounded-2xl transition-all active:scale-[0.985]'
                    }, 'Add to Cart')
                )
            );
        }

        function CartDrawer({ isOpen, setIsOpen, checkout }) {
            const { cart, removeFromCart } = useContext(CartContext);

            if (!isOpen) return null;

            const total = cart && cart.totals ? cart.totals.total.value : 0;

            return React.createElement('div', {
                className: 'fixed inset-0 z-[100] flex'
            },
                React.createElement('div', {
                    className: 'absolute inset-0 bg-black/70',
                    onClick: () => setIsOpen(false)
                }),
                React.createElement('div', {
                    className: 'ml-auto w-full max-w-md bg-zinc-900 h-full flex flex-col shadow-2xl translate-x-0 transition-transform'
                },
                    React.createElement('div', { className: 'p-8 border-b border-zinc-800 flex justify-between items-center' },
                        React.createElement('h2', { className: 'text-2xl font-semibold' }, 'Your Cart'),
                        React.createElement('button', {
                            onClick: () => setIsOpen(false),
                            className: 'text-zinc-400 hover:text-white'
                        }, React.createElement('i', { className: 'fa-solid fa-xmark text-2xl' }))
                    ),

                    React.createElement('div', { className: 'flex-1 overflow-auto p-8 space-y-8' },
                        !cart || !cart.items || cart.items.length === 0 ?
                        React.createElement('div', { className: 'flex flex-col items-center justify-center h-full text-center py-20' },
                            React.createElement('i', { className: 'fa-solid fa-cart-shopping text-6xl text-zinc-700 mb-6' }),
                            React.createElement('p', { className: 'text-zinc-500' }, 'Your cart is empty')
                        ) :
                        cart.items.map(item => 
                            React.createElement('div', {
                                key: item.variant.id,
                                className: 'flex gap-6'
                            },
                                React.createElement('img', {
                                    src: item.variant.images && item.variant.images[0] ? item.variant.images[0].url : '',
                                    className: 'w-24 h-24 object-cover rounded-2xl'
                                }),
                                React.createElement('div', { className: 'flex-1' },
                                    React.createElement('div', { className: 'font-medium' }, item.variant.product.name),
                                    React.createElement('div', { className: 'text-sm text-zinc-400' }, item.variant.attributes.description || ''),
                                    React.createElement('div', { className: 'text-emerald-400 mt-1' }, `$${item.variant.unitPrice.value} × ${item.quantity}`),
                                    React.createElement('button', {
                                        onClick: () => removeFromCart(item.variant.id),
                                        className: 'text-red-400 text-xs mt-3 hover:underline'
                                    }, 'Remove')
                                )
                            )
                        )
                    ),

                    React.createElement('div', { className: 'p-8 border-t border-zinc-800' },
                        React.createElement('div', { className: 'flex justify-between text-lg mb-8' },
                            React.createElement('span', null, 'Total'),
                            React.createElement('span', { className: 'font-semibold' }, `$${total}`)
                        ),
                        React.createElement('button', {
                            onClick: checkout,
                            disabled: !cart || !cart.items || cart.items.length === 0,
                            className: 'w-full bg-emerald-500 hover:bg-emerald-400 disabled:bg-zinc-700 text-black font-semibold py-5 rounded-3xl text-lg transition-all'
                        }, 'Proceed to Checkout')
                    )
                )
            );
        }

        // Render App
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            React.createElement(CartProvider, null,
                React.createElement(App)
            )
        );
    </script>
</body>
</html>
